<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Air Draw — Hand Gesture Drawing</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<style>
  :root{
    --bg: #0d0f14;
    --panel: #161922;
    --panel-border: #262b38;
    --accent: #6ee7ff;
    --text: #e7eaf0;
    --muted: #8b93a7;
  }
  *{ box-sizing: border-box; }
  body{
    margin:0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    display:flex;
    flex-direction:column;
    align-items:center;
    min-height:100vh;
    padding: 20px;
  }
  h1{
    font-size: 18px;
    font-weight: 600;
    letter-spacing: 0.3px;
    margin: 0 0 14px 0;
    color: var(--text);
  }
  .stage{
    position:relative;
    width: min(960px, 96vw);
    aspect-ratio: 4/3;
    border-radius: 16px;
    overflow:hidden;
    border:1px solid var(--panel-border);
    background:#000;
    box-shadow: 0 10px 40px rgba(0,0,0,0.5);
  }
  video, canvas{
    position:absolute;
    top:0; left:0;
    width:100%;
    height:100%;
    transform: scaleX(-1); /* mirror */
  }
  #drawLayer{ pointer-events:none; }
  #status{
    position:absolute;
    top:12px; left:12px;
    background: rgba(10,12,18,0.65);
    backdrop-filter: blur(6px);
    padding: 8px 14px;
    border-radius: 10px;
    font-size: 13px;
    border: 1px solid rgba(255,255,255,0.08);
    transform: none;
    z-index: 5;
  }
  #status b{ color: var(--accent); }

  .controls{
    width: min(960px, 96vw);
    margin-top: 16px;
    display:flex;
    flex-wrap:wrap;
    align-items:center;
    gap: 12px;
    background: var(--panel);
    border: 1px solid var(--panel-border);
    border-radius: 14px;
    padding: 14px 16px;
  }
  .group{
    display:flex;
    align-items:center;
    gap:8px;
  }
  .colors{
    display:flex;
    gap:8px;
  }
  .swatch{
    width: 26px;
    height: 26px;
    border-radius: 50%;
    cursor:pointer;
    border: 2px solid rgba(255,255,255,0.15);
    transition: transform 0.12s ease, border-color 0.12s ease;
  }
  .swatch:hover{ transform: scale(1.12); }
  .swatch.active{
    border-color: #fff;
    transform: scale(1.18);
  }
  button{
    background:#1f2433;
    color: var(--text);
    border: 1px solid var(--panel-border);
    padding: 9px 14px;
    border-radius: 9px;
    cursor:pointer;
    font-size: 13px;
    font-weight: 500;
    transition: background 0.15s ease, opacity 0.15s ease;
  }
  button:hover{ background:#272d40; }
  button:disabled{ opacity: 0.35; cursor:not-allowed; }
  .divider{
    width:1px;
    height: 26px;
    background: var(--panel-border);
    margin: 0 4px;
  }
  .muted{ color: var(--muted); font-size: 12px; }
  #loading{
    position:absolute;
    inset:0;
    display:flex;
    align-items:center;
    justify-content:center;
    background: rgba(0,0,0,0.7);
    font-size: 14px;
    color: var(--muted);
    z-index: 10;
  }
</style>
</head>
<body>

<h1>Air Draw</h1>
<div style="max-width:960px;width:96vw;margin:0 0 15px;background:#161922;border:1px solid #262b38;border-radius:12px;padding:12px 16px;line-height:1.7">
<b>Gesture Guide</b><br>Idle — No drawing<br>1 Finger — Draw<br>2 Fingers — Highlight<br>Palm — Erase
</div>

<div class="stage" id="stage">
  <video id="video" playsinline></video>
  <canvas id="drawLayer"></canvas>
  <canvas id="overlay"></canvas>
  <div id="status">Mode: <b id="modeText">—</b></div>
  <div id="loading">Loading hand-tracking model & starting camera…</div>
</div>

<div class="controls">
  <div class="group">
    <span class="muted">Colour</span>
    <div class="colors" id="colors">
      <div class="swatch active" style="background:#ff4757" data-color="#ff4757"></div>
      <div class="swatch" style="background:#ffa502" data-color="#ffa502"></div>
      <div class="swatch" style="background:#2ed573" data-color="#2ed573"></div>
      <div class="swatch" style="background:#1e90ff" data-color="#1e90ff"></div>
      <div class="swatch" style="background:#a55eea" data-color="#a55eea"></div>
      <div class="swatch" style="background:#ffffff" data-color="#ffffff"></div>
      <div class="swatch" style="background:#2f3542" data-color="#2f3542"></div>
    </div>
  </div>

  <div class="divider"></div>

  <div class="group">
    <button id="undoBtn">↶ Undo</button>
    <button id="redoBtn">↷ Redo</button>
    <button id="clearBtn">🗑 Clear</button>
  </div>

  <div class="divider"></div>

  <div class="group">
    <span class="muted" id="handCount">No hand detected</span>
  </div>
</div>

<!-- MediaPipe Hands (loaded from CDN) -->
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

<script>
const video = document.getElementById('video');
const drawLayer = document.getElementById('drawLayer'); // permanent strokes
const overlay = document.getElementById('overlay');      // hand skeleton + cursor
const drawCtx = drawLayer.getContext('2d');
const overlayCtx = overlay.getContext('2d');
const stage = document.getElementById('stage');
const loadingEl = document.getElementById('loading');
const modeText = document.getElementById('modeText');
const handCount = document.getElementById('handCount');

let currentColor = '#ff4757';

// ---- Canvas sizing ----
function resizeCanvases(){
  const w = stage.clientWidth, h = stage.clientHeight;
  [drawLayer, overlay].forEach(c=>{
    // preserve drawing on resize by redrawing from history
    c.width = w;
    c.height = h;
  });
  redrawFromHistory();
}
window.addEventListener('resize', resizeCanvases);

// ---- Stroke history (for undo/redo) ----
// Each stroke: {points:[{x,y}], color, size, mode: 'draw'|'highlight'}
let strokes = [];
let redoStack = [];
let currentStroke = null;

function pushStroke(stroke){
  strokes.push(stroke);
  redoStack = [];
  updateUndoRedoButtons();
}

function undo(){
  if(strokes.length === 0) return;
  redoStack.push(strokes.pop());
  redrawFromHistory();
  updateUndoRedoButtons();
}

function redo(){
  if(redoStack.length === 0) return;
  strokes.push(redoStack.pop());
  redrawFromHistory();
  updateUndoRedoButtons();
}

function clearAll(){
  if(strokes.length === 0) return;
  strokes = [];
  redoStack = [];
  redrawFromHistory();
  updateUndoRedoButtons();
}

function updateUndoRedoButtons(){
  document.getElementById('undoBtn').disabled = strokes.length === 0;
  document.getElementById('redoBtn').disabled = redoStack.length === 0;
}

function drawStroke(ctx, stroke){
  if(stroke.points.length < 1) return;
  ctx.save();
  ctx.lineJoin = 'round';
  ctx.lineCap = 'round';
  if(stroke.mode === 'highlight'){
    ctx.globalAlpha = 0.35;
    ctx.lineWidth = stroke.size;
    ctx.strokeStyle = stroke.color;
  } else {
    ctx.globalAlpha = 1;
    ctx.lineWidth = stroke.size;
    ctx.strokeStyle = stroke.color;
  }
  ctx.beginPath();
  ctx.moveTo(stroke.points[0].x, stroke.points[0].y);
  for(let i=1;i<stroke.points.length;i++){
    ctx.lineTo(stroke.points[i].x, stroke.points[i].y);
  }
  ctx.stroke();
  ctx.restore();
}

function redrawFromHistory(){
  drawCtx.clearRect(0,0,drawLayer.width, drawLayer.height);
  for(const s of strokes){
    drawStroke(drawCtx, s);
  }
}

// ---- Eraser (object-style: removes points near cursor by splitting strokes) ----
function eraseAt(x, y, radius){
  let changed = false;
  const newStrokes = [];
  for(const s of strokes){
    let segments = [[]];
    for(const p of s.points){
      const d = Math.hypot(p.x-x, p.y-y);
      if(d < radius){
        changed = true;
        segments.push([]); // break the line here
      } else {
        segments[segments.length-1].push(p);
      }
    }
    for(const seg of segments){
      if(seg.length > 1){
        newStrokes.push({...s, points: seg});
      }
    }
  }
  if(changed){
    strokes = newStrokes;
    redoStack = [];
    redrawFromHistory();
    updateUndoRedoButtons();
  }
}

// ---- UI wiring ----
document.getElementById('undoBtn').addEventListener('click', undo);
document.getElementById('redoBtn').addEventListener('click', redo);
document.getElementById('clearBtn').addEventListener('click', clearAll);

document.querySelectorAll('.swatch').forEach(sw=>{
  sw.addEventListener('click', ()=>{
    document.querySelectorAll('.swatch').forEach(s=>s.classList.remove('active'));
    sw.classList.add('active');
    currentColor = sw.dataset.color;
  });
});

// Keyboard shortcuts too (handy while testing)
window.addEventListener('keydown', (e)=>{
  if((e.ctrlKey||e.metaKey) && e.key.toLowerCase()==='z' && !e.shiftKey){ e.preventDefault(); undo(); }
  if((e.ctrlKey||e.metaKey) && (e.key.toLowerCase()==='y' || (e.shiftKey && e.key.toLowerCase()==='z'))){ e.preventDefault(); redo(); }
});

// ---- Hand landmark helpers ----
// Landmark indices (MediaPipe Hands):
// 0 wrist, 4 thumb tip, 8 index tip, 12 middle tip, 16 ring tip, 20 pinky tip
// PIP joints: 6 index pip, 10 middle pip, 14 ring pip, 18 pinky pip

function fingerUp(landmarks, tipIdx, pipIdx){
  // In image coords, y grows downward. Finger "up" (extended) if tip is above pip.
  return landmarks[tipIdx].y < landmarks[pipIdx].y - 0.02;
}

function thumbUp(landmarks, handedness){
  // Thumb extension judged by x distance from palm, direction depends on hand
  const tip = landmarks[4], ip = landmarks[3], mcp = landmarks[2];
  return Math.abs(tip.x - mcp.x) > 0.06;
}

function classifyGesture(landmarks){
  const index = fingerUp(landmarks, 8, 6);
  const middle = fingerUp(landmarks, 12, 10);
  const ring = fingerUp(landmarks, 16, 14);
  const pinky = fingerUp(landmarks, 20, 18);

  const upCount = [index, middle, ring, pinky].filter(Boolean).length;

  if(upCount >= 4){
    return 'erase';
  }
  if(index && middle && !ring && !pinky){
    return 'highlight';
  }
  if(index && !middle && !ring && !pinky){
    return 'draw';
  }
  return 'idle';
}

// ---- MediaPipe Hands setup ----
const hands = new Hands({
  locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
});
hands.setOptions({
  maxNumHands: 1,
  modelComplexity: 1,
  minDetectionConfidence: 0.7,
  minTrackingConfidence: 0.6
});

let lastPoint = null;
let smoothX = null, smoothY = null;
const SMOOTHING = 0.5; // higher = smoother but laggier

hands.onResults((results)=>{
  overlayCtx.clearRect(0,0,overlay.width, overlay.height);

  if(!results.multiHandLandmarks || results.multiHandLandmarks.length === 0){
    handCount.textContent = 'No hand detected';
    modeText.textContent = '—';
    lastPoint = null;
    currentStroke = null;
    return;
  }

  handCount.textContent = '1 hand detected';
  const landmarks = results.multiHandLandmarks[0];
  const gesture = classifyGesture(landmarks);

  // Use index fingertip as cursor for draw/highlight; use middle-of-palm for erase
  let cx, cy;
  if(gesture === 'erase'){
    const wrist = landmarks[0], middleMcp = landmarks[9];
    cx = (wrist.x + middleMcp.x)/2;
    cy = (wrist.y + middleMcp.y)/2;
  } else {
    cx = landmarks[8].x;
    cy = landmarks[8].y;
  }

  // Convert normalized [0,1] coords -> canvas pixels.
  // The <video> and <canvas> elements are already mirrored via CSS (scaleX(-1)),
  // so we draw using the raw (unflipped) coordinates and let CSS handle the mirroring.
  const px = cx * overlay.width;
  const py = cy * overlay.height;

  if(smoothX === null){ smoothX = px; smoothY = py; }
  smoothX = smoothX * SMOOTHING + px * (1-SMOOTHING);
  smoothY = smoothY * SMOOTHING + py * (1-SMOOTHING);

  // Draw cursor indicator
  overlayCtx.save();
  overlayCtx.beginPath();
  let radius = gesture === 'erase' ? 36 : (gesture === 'highlight' ? 14 : 8);
  overlayCtx.arc(smoothX, smoothY, radius, 0, Math.PI*2);
  if(gesture === 'erase'){
    overlayCtx.strokeStyle = 'rgba(255,255,255,0.8)';
    overlayCtx.lineWidth = 2;
    overlayCtx.stroke();
  } else if(gesture === 'highlight'){
    overlayCtx.fillStyle = currentColor;
    overlayCtx.globalAlpha = 0.5;
    overlayCtx.fill();
  } else if(gesture === 'draw'){
    overlayCtx.fillStyle = currentColor;
    overlayCtx.fill();
  } else {
    overlayCtx.strokeStyle = 'rgba(255,255,255,0.4)';
    overlayCtx.lineWidth = 1.5;
    overlayCtx.stroke();
  }
  overlayCtx.restore();

  modeText.textContent =
    gesture === 'draw' ? 'Drawing ☝️' :
    gesture === 'highlight' ? 'Highlighter ✌️' :
    gesture === 'erase' ? 'Eraser 🖐️' : 'Idle';

  // Action per gesture
  if(gesture === 'draw' || gesture === 'highlight'){
    if(!currentStroke || currentStroke.mode !== gesture){
      // start a new stroke
      currentStroke = {
        points: [{x: smoothX, y: smoothY}],
        color: currentColor,
        size: gesture === 'highlight' ? 26 : 5,
        mode: gesture
      };
      strokes.push(currentStroke);
      redoStack = [];
    } else {
      currentStroke.points.push({x: smoothX, y: smoothY});
    }
    redrawFromHistory();
    updateUndoRedoButtons();
  } else if(gesture === 'erase'){
    currentStroke = null;
    eraseAt(smoothX, smoothY, 36);
  } else {
    currentStroke = null;
  }
});

// ---- Camera setup ----
async function start(){
  try{
    const stream = await navigator.mediaDevices.getUserMedia({ video: { width: 1280, height: 960 }, audio:false });
    video.srcObject = stream;
    await video.play();
    resizeCanvases();

    const camera = new Camera(video, {
      onFrame: async ()=>{
        await hands.send({image: video});
      },
      width: 1280,
      height: 960
    });
    camera.start();
    loadingEl.style.display = 'none';
  } catch(err){
    loadingEl.textContent = 'Camera access failed: ' + err.message + ' (check browser permissions)';
    console.error(err);
  }
}

resizeCanvases();
updateUndoRedoButtons();
start();
</script>
</body>
</html>
